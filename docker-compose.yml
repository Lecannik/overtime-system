services:
  # 1. База данных
  postgres:
    image: postgres:15
    container_name: overtime_postgres
    hostname: postgres
    restart: always
    env_file: [ .env ]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - overtime_network

  # 2. Бэкенд (FastAPI)
  backend:
    build: ./backend
    container_name: overtime_backend
    hostname: backend
    restart: always
    env_file: [ .env ]
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8001:8000"
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
      - ./backend/uploads:/app/uploads
      - ./models/cache/whisper:/root/.cache/whisper
      - ./models/cache/huggingface:/root/.cache/huggingface
      - ./models/gazeta:/app/models/gazeta
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ot-backend.rule=PathPrefix(`/api`) || PathPrefix(`/docs`) || PathPrefix(`/redoc`) || PathPrefix(`/openapi.json`) || PathPrefix(`/uploads`)"
      - "traefik.http.routers.ot-backend.entrypoints=web"
      - "traefik.http.routers.ot-backend.priority=20"
      - "traefik.http.services.ot-backend.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - overtime_network

  # 3. Фронтенд (React Static)
  frontend:
    build:
      context: ./frontend
      args:
        - FAST_BUILD=true
    container_name: overtime_frontend
    hostname: frontend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ot-frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ot-frontend.entrypoints=web"
      - "traefik.http.routers.ot-frontend.priority=1"
      - "traefik.http.services.ot-frontend.loadbalancer.server.port=80"
    networks:
      - overtime_network

  # 4. Внутренний роутер (Gateway) - ЗАМЕНЕН НА TRAEFIK
  traefik:
    image: traefik:v2.11
    container_name: overtime_traefik
    hostname: traefik
    restart: always
    environment:
      - DOCKER_API_VERSION=1.40
    ports:
      - "8080:80" # Основной вход (как был у nginx)
      - "8081:8080" # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - overtime_network

volumes:
  postgres_data:


networks:
  overtime_network:
    driver: bridge
