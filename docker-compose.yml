version: "3.9"

services:
  # 1. База данных
  postgres:
    image: postgres:15
    container_name: overtime_postgres
    restart: always
    env_file: [ .env ]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [ overtime_network ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. Бэкенд (FastAPI)
  backend:
    build: ./backend
    container_name: overtime_backend
    restart: always
    env_file: [ .env ]
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - ./backend/uploads:/app/uploads
      - ./models/cache:/app/.cache/whisper
      - ./models/gazeta:/app/models/gazeta # Проброс модели суммаризатора
    networks: [ overtime_network ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. Фронтенд (React Static)
  frontend:
    build: ./frontend
    container_name: overtime_frontend
    restart: always
    networks: [ overtime_network ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 4. Внутренний роутер (Gateway)
  nginx-router:
    image: nginx:stable-alpine
    container_name: overtime_router
    restart: always
    volumes:
      - ./infra/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8090:80"
    depends_on:
      - backend
      - frontend
    networks: [ overtime_network ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 5. Резервное копирование БД
  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: overtime_db_backup
    restart: always
    env_file: [ .env ]
    environment:
      - POSTGRES_HOST=postgres
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=14
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
    volumes:
      - ./infra/backups:/backups
    depends_on:
      postgres: { condition: service_healthy }
    networks: [ overtime_network ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:


networks:
  overtime_network:
    driver: bridge
