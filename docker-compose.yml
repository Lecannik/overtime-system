version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: overtime_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - overtime_network

  backend:
    build: ./backend
    container_name: overtime_backend
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - overtime_network


volumes:
  postgres_data:

networks:
  overtime_network:
    driver: bridge
