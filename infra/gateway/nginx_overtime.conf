# Конфигурация для ВНЕШНЕГО Nginx (на Хост-машине)
# Этот файл должен лежать в /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _; # Можно заменить на IP или домен

    # Логи полезно иметь отдельно
    access_log /var/log/nginx/overtime_access.log;
    error_log /var/log/nginx/overtime_error.log;

    client_max_body_size 10M;

    # Весь трафик перенаправляем на Вход Роутера Docker
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
