# Зона ограничения частоты запросов для авторизации: 10 запросов в минуту с одного IP
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

server {
    listen 80;

    # Доверие заголовкам X-Forwarded-For от прокси-серверов во внутренней сети виртуальных машин
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Документация API (Swagger / ReDoc)
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Раздача статики с бэкенда (голосовые сообщения)
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Лимитирование эндпоинтов авторизации и 2FA
    location ~ ^/api/v1/auth/(login|verify-2fa) {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;
        
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Маршрутизация на Бэкенд
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Маршрутизация на Фронтенд
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
