# =======================================================
# GitHub Actions: CD Pipeline — Сборка, Публикация и Деплой с уведомлением в Telegram
# =======================================================
# Запускается после успешного прохождения CI при push в main.
#
# Требуемые GitHub Secrets:
#   DOCKERHUB_USERNAME — логин DockerHub (lecannik)
#   DOCKERHUB_TOKEN   — Access Token (https://hub.docker.com/settings/security)
#   TELEGRAM_BOT_TOKEN — Токен бота
#   TELEGRAM_CHAT_ID   — ID чата или пользователя для уведомлений
# =======================================================

name: CD — Build, Push & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────
  # Сборка и публикация образа БЭКЕНДА
  # ──────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────
  # Сборка и публикация образа ФРОНТЕНДА
  # ──────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://overtime.polymedia.kz
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────
  # ДЕПЛОЙ и УВЕДОМЛЕНИЕ
  # ──────────────────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: [build-backend, build-frontend]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Update application
        if: needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
        run: |
          cd /opt/overtime
          docker compose pull
          docker compose up -d
          docker compose restart nginx-router
          docker image prune -f

      - name: Send Telegram Notification
        if: always()
        run: |
          # Формируем статус
          if [[ "${{ needs.build-backend.result }}" == "success" && "${{ needs.build-frontend.result }}" == "success" ]]; then
            STATUS="✅ *Успешно*"
          else
            STATUS="❌ *Ошибка*"
          fi
          
          # Текст сообщения
          MESSAGE="${STATUS} %0A🚀 *Проект:* Overtime Pro %0A🏗 *Сборка:* #${{ github.run_number }} %0A👤 *Автор:* ${{ github.actor }} %0A📝 *Коммит:* ${{ github.event.head_commit.message }} %0A🔗 [Подробнее](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          
          # Отправка через curl
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"
