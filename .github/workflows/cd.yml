# =======================================================
# GitHub Actions: CD Pipeline — Сборка, Публикация и Деплой
# =======================================================
# Запускается при push в main. Сначала прогоняет CI-тесты,
# затем собирает Docker-образы, деплоит и уведомляет в Telegram.
#
# Требуемые GitHub Secrets:
#   DOCKERHUB_USERNAME — логин DockerHub
#   DOCKERHUB_TOKEN   — Access Token
#   TELEGRAM_BOT_TOKEN — Токен бота
#   TELEGRAM_CHAT_ID   — ID чата для уведомлений
# =======================================================

name: CD — Build, Push & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # CI-проверки (тесты + линтинг) — gate перед сборкой
  # ──────────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ──────────────────────────────────────────────────────
  # Сборка и публикация образа БЭКЕНДА
  # ──────────────────────────────────────────────────────
  build-backend:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────
  # Сборка и публикация образа ФРОНТЕНДА
  # ──────────────────────────────────────────────────────
  build-frontend:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://overtime.polymedia.kz
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────
  # ДЕПЛОЙ
  # ──────────────────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: [build-backend, build-frontend]

    steps:
      # Чекаут нужен только чтобы доставить на сервер compose-файл и nginx.conf.
      # Сам код приложения едет на сервер ИСКЛЮЧИТЕЛЬНО в виде образов из DockerHub.
      - name: Checkout code
        uses: actions/checkout@v4

      # Доставляем на сервер только необходимое: prod-compose и конфиг роутера.
      # Никакого git-репозитория и исходников на проде быть не должно.
      - name: Copy deploy files to server
        run: |
          scp -o StrictHostKeyChecking=no docker-compose.prod.yml nik@192.168.20.21:/opt/overtime/docker-compose.prod.yml
          scp -o StrictHostKeyChecking=no infra/gateway/nginx.conf nik@192.168.20.21:/opt/overtime/nginx.conf

      - name: Update application
        run: |
          ssh -o StrictHostKeyChecking=no nik@192.168.20.21 'bash -s' << 'EOF'
          set -e
          cd /opt/overtime
          # Пинним конкретную версию образа (sha коммита) вместо :latest —
          # это делает деплой воспроизводимым, а откат — тривиальным.
          export IMAGE_TAG=${{ github.sha }}
          # Pull с ретраями: DockerHub/CloudFront периодически рвёт соединение
          # ("connection reset by peer"). Транзиентный сбой не должен валить
          # деплой с первой попытки.
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.prod.yml pull; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "❌ docker compose pull не удался после 3 попыток"
              exit 1
            fi
            echo "⚠️ pull сорвался (попытка $attempt/3), повтор через 10с..."
            sleep 10
          done
          docker compose -f docker-compose.prod.yml up -d
          docker compose -f docker-compose.prod.yml restart nginx-router

          # Проверка доступности бэкенда после деплоя.
          # При первом деплое на чистый volume модели скачиваются в фоне
          # (~3-5 мин), поэтому даём 300 секунд (150 × 2s).
          echo "⏳ Ожидаем запуск бэкенда (до 300 секунд)..."
          for i in $(seq 1 150); do
            if curl -sf http://localhost/api/v1/auth/me > /dev/null 2>&1 || \
               curl -o /dev/null -s -w "%{http_code}" http://localhost/api/v1/auth/me | grep -qE "^(200|401|403|405|422)$"; then
              echo "✅ Бэкенд доступен (попытка $i)"
              break
            fi
            if [ "$i" -eq 150 ]; then
              echo "❌ Бэкенд не ответил за 300 секунд"
              docker compose -f docker-compose.prod.yml logs --tail=50 backend
              exit 1
            fi
            sleep 2
          done

          # Очистка неиспользуемых образов после деплоя
          docker image prune -f
          docker builder prune -f

          # Очистка легаси-артефактов на проде. На сервере должно оставаться
          # только необходимое: docker-compose.prod.yml, .env, nginx.conf, backups/.
          # Удаляем через одноразовый root-контейнер: часть файлов (.pyc, models/*)
          # принадлежит root и host-овым rm под пользователем nik не удаляется.
          # Шаг НЕ критичен (косметика): любой сбой гасим в "|| echo", чтобы из-за
          # set -e неудача очистки никогда не роняла уже выполненный деплой.
          echo "🧹 Чистим легаси-файлы (исходники, git-репозиторий, старый compose)..."
          docker run --rm -v /opt/overtime:/work -w /work alpine sh -c '
            rm -rf .git .github backend frontend infra models
            rm -f docker-compose.yml docker-compose.override.yml \
                  deploy.sh logs.txt README.md .gitignore .env.example .env.prod.example
          ' || echo "⚠️ Очистка частично не удалась — некритично, деплой уже выполнен"
          echo "📂 Содержимое /opt/overtime после очистки:"
          ls -la
          EOF

  # ──────────────────────────────────────────────────────
  # УВЕДОМЛЕНИЕ В TELEGRAM
  # ──────────────────────────────────────────────────────
  # Отдельная job: needs на все предыдущие + if: always() гарантируют, что
  # оповещение уйдёт при ЛЮБОМ исходе — включая падение самих сборок, когда
  # deploy-джоба пропускается. Статус считаем по результатам всех job
  # (needs.<job>.result), а не по шагам внутри одной job.
  notify:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, deploy]
    if: always()
    steps:
      - name: Send Telegram Notification
        env:
          BUILD_BACKEND: ${{ needs.build-backend.result }}
          BUILD_FRONTEND: ${{ needs.build-frontend.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          COMMIT_MSG: ${{ github.event.head_commit.message || 'Ручной запуск' }}
          ACTOR: ${{ github.actor }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Успех только если прошли ОБЕ сборки И сам деплой. Любой иной исход
          # (failure / cancelled / skipped у любой из job) → "Ошибка".
          if [[ "$BUILD_BACKEND" == "success" && "$BUILD_FRONTEND" == "success" && "$DEPLOY_RESULT" == "success" ]]; then
            STATUS="✅ Успешно"
          else
            STATUS="❌ Ошибка"
          fi

          # Экранируем пользовательский ввод (защита от Script Injection)
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -c 200 | tr -cd '[:alnum:][:space:]:.,-/')
          SAFE_ACTOR=$(echo "$ACTOR" | tr -cd '[:alnum:]_-')

          MESSAGE="${STATUS}
          Проект: Overtime Pro
          Сборка: #${RUN_NUMBER}
          Автор: ${SAFE_ACTOR}
          Коммит: ${SAFE_MSG}
          https://github.com/${REPO}/actions/runs/${RUN_ID}"

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=${MESSAGE}"
