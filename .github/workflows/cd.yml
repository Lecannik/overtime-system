# =======================================================
# GitHub Actions: CD Pipeline — Сборка и публикация Docker-образов на DockerHub
# =======================================================
# Запускается после успешного прохождения CI при push в main.
#
# Требуемые GitHub Secrets:
#   DOCKERHUB_USERNAME — логин DockerHub (lecannik)
#   DOCKERHUB_TOKEN   — Access Token из https://hub.docker.com/settings/security
# =======================================================

name: CD — Build & Push Docker Images

on:
  push:
    branches: [ main ]
  # Ручной запуск из интерфейса GitHub
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────
  # Сборка и публикация образа БЭКЕНДА
  # ──────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    # Запускаем только после успешного CI (если это push, CI запустится первым)
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────
  # Сборка и публикация образа ФРОНТЕНДА
  # ──────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
