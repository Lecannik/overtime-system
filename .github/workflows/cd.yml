# =======================================================
# GitHub Actions: CD Pipeline — Сборка, Публикация и Деплой
# =======================================================
# Запускается при push в main. Сначала прогоняет CI-тесты,
# затем собирает Docker-образы, деплоит и уведомляет в Telegram.
#
# Требуемые GitHub Secrets:
#   DOCKERHUB_USERNAME — логин DockerHub
#   DOCKERHUB_TOKEN   — Access Token
#   TELEGRAM_BOT_TOKEN — Токен бота
#   TELEGRAM_CHAT_ID   — ID чата для уведомлений
# =======================================================

name: CD — Build, Push & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────
  # CI-проверки (тесты + линтинг) — gate перед сборкой
  # ──────────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ──────────────────────────────────────────────────────
  # Сборка и публикация образа БЭКЕНДА
  # ──────────────────────────────────────────────────────
  build-backend:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────
  # Сборка и публикация образа ФРОНТЕНДА
  # ──────────────────────────────────────────────────────
  build-frontend:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/overtime-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://overtime.polymedia.kz
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────
  # ДЕПЛОЙ и УВЕДОМЛЕНИЕ
  # ──────────────────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: [build-backend, build-frontend]

    steps:
      - name: Update application
        run: |
          cd /opt/overtime
          git fetch origin
          git checkout origin/main -- infra/gateway/nginx.conf
          cp infra/gateway/nginx.conf nginx.conf
          docker compose pull
          docker compose up -d
          docker compose restart nginx-router

          # Проверка доступности бэкенда после деплоя
          echo "⏳ Ожидаем запуск бэкенда..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost/api/v1/health > /dev/null 2>&1; then
              echo "✅ Бэкенд доступен"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Бэкенд не ответил за 60 секунд"
              docker compose logs --tail=50 backend
              exit 1
            fi
            sleep 2
          done

          # Очистка только устаревших образов (старше 24ч)
          docker image prune -f --filter "until=24h"

      - name: Send Telegram Notification
        if: always()
        env:
          BUILD_BACKEND: ${{ needs.build-backend.result }}
          BUILD_FRONTEND: ${{ needs.build-frontend.result }}
          COMMIT_MSG: ${{ github.event.head_commit.message || 'Ручной запуск' }}
          ACTOR: ${{ github.actor }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ "$BUILD_BACKEND" == "success" && "$BUILD_FRONTEND" == "success" ]]; then
            STATUS="✅ Успешно"
          else
            STATUS="❌ Ошибка"
          fi

          # Экранируем пользовательский ввод (защита от Script Injection)
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -c 200 | tr -cd '[:alnum:][:space:]:.,-/')
          SAFE_ACTOR=$(echo "$ACTOR" | tr -cd '[:alnum:]_-')

          MESSAGE="${STATUS}
          Проект: Overtime Pro
          Сборка: #${RUN_NUMBER}
          Автор: ${SAFE_ACTOR}
          Коммит: ${SAFE_MSG}
          https://github.com/${REPO}/actions/runs/${RUN_ID}"

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=${MESSAGE}"
