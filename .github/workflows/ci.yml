name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  # 1. Тестирование Бэкенда (FastAPI)
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-asyncio aiosqlite

      - name: Run Pytest
        env:
          POSTGRES_USER: overtime_user
          POSTGRES_PASSWORD: ci_test_only_pwd_42x
          POSTGRES_DB: overtime_db
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          SECRET_KEY: ci_test_secret_not_for_prod
          ALLOWED_ORIGINS: "http://localhost"
        run: |
          PYTHONPATH=. pytest --asyncio-mode=auto app/tests/test_auth.py app/tests/test_overtime.py

  # 2. Сборка и Линтинг Фронтенда (React Static)
  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build Frontend
        run: npm run build
